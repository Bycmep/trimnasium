<!DOCTYPE html>
<html lang="en-US">
<head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<link rel="stylesheet" href="./font.css">
<style>

<body>

<script type="module">
import { Page } from "./lib/domchain.js";
import { PageParse } from './lib/domchainparse.js';
Page.prototype.parse = PageParse;
import { Alert } from "./lib/alert.js";
import { Spinner2 } from "./lib/spinner2.js";
const em = parseFloat(window.getComputedStyle(document.body).fontSize);

const style = `
div.loader {
    position: fixed; left: 0; top: 0; right: 0; bottom: 0; background-color: rgba(255, 255, 255, 0.8);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    div.spinner { width: 5em; display: inline-block; }
}`;

const spinner = new Spinner2();
const loader = Page.body.insert("div.loader");
loader.insert('style').text(style).append(new Page(spinner.e)).class('spinner');


</script>
</body>
